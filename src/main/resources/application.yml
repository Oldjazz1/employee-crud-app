spring:
  application:
    name: dcrudapp

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/employees_db
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

server:
  port: 8080
